[workspace]
resolver = "2"
members = [
    "crates/chain",
    "crates/core",
    "crates/file_store",
    "crates/electrum",
    "crates/esplora",
    "crates/bitcoind_rpc",
    "crates/testenv",
    "examples/example_cli",
    "examples/example_electrum",
    "examples/example_esplora",
    "examples/example_bitcoind_rpc_polling",
]

[workspace.package]
authors = ["Bitcoin Dev Kit Developers"]

[workspace.lints.clippy]
print_stdout = "deny"
print_stderr = "deny"

[patch.crates-io.corepc-types]
git = "https://github.com/rust-bitcoin/corepc.git"
branch = "master"

[patch.crates-io.corepc-client]
git = "https://github.com/rust-bitcoin/corepc.git"
branch = "master"

[patch.crates-io.corepc-node]
git = "https://github.com/rust-bitcoin/corepc.git"
branch = "master"

[patch.crates-io.electrsd]
git = "https://github.com/oleonardolima/electrsd.git"
branch = "deps/bump-corepc-deps"